        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/review-queue/{id}/approve:
    post:
      operationId: approveReviewQueueEntry
      summary: Approve a review queue entry
      description: |
        Approve an event in the review queue and publish it. The event's lifecycle
        state will be updated to 'published' and it will appear in public listings.

        Set `record_not_duplicates: true` to implement the "Not a Duplicate" action:
        the event is published and the duplicate-warning candidates are recorded as a
        confirmed non-duplicate pair, suppressing re-flagging on future ingest.
        This differs from a plain approve only in the side-effect on the
        `not_duplicates` table; the event transition is identical.
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Review queue entry ID
          schema:
            type: integer
            minimum: 1
      requestBody:
        description: Optional review notes for approval
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
                  description: Optional review notes
                record_not_duplicates:
                  type: boolean
                  description: |
                    When `true`, any `potential_duplicate` warning candidates in this
                    review entry are recorded as confirmed non-duplicates. Future ingest
                    of events that match these pairs will not generate duplicate warnings.
                    Used by the "Not a Duplicate" UI action, which approves/publishes the
                    event while acknowledging that the duplicate flag was incorrect.
                    Matched companion pending reviews are rechecked best-effort after the
                    duplicate warnings are removed: if no issues remain they are
                    auto-approved, otherwise they stay pending with refreshed warnings.
            examples:
              withNotes:
                summary: Approval with notes
                value:
                  notes: "Date corrections look good, publishing"
              withoutNotes:
                summary: Simple approval
                value: {}
              notADuplicate:
                summary: Approve as not-a-duplicate (suppresses future duplicate warnings)
                value:
                  notes: "Different event, same venue"
                  record_not_duplicates: true
      responses:
        '200':
          description: Review approved and event published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewQueueDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Review entry has already been processed
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '410':
          description: Event has been deleted
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/review-queue/{id}/reject:
    post:
      operationId: rejectReviewQueueEntry
      summary: Reject a review queue entry
      description: |
        Reject an event in the review queue and mark it as deleted. The event will
        return HTTP 410 Gone with a tombstone and will not appear in public listings.
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Review queue entry ID
          schema:
            type: integer
            minimum: 1
      requestBody:
        description: Rejection reason (required) explaining why the event was rejected
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: Required rejection reason
            examples:
              invalidDates:
                summary: Reject due to invalid dates
                value:
                  reason: "Event dates are in the past and cannot be corrected"
              spam:
                summary: Reject spam event
                value:
                  reason: "Spam submission - not a legitimate event"
      responses:
        '200':
          description: Review rejected and event deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewQueueDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Review entry has already been processed
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '410':
          description: Event has already been deleted
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/review-queue/{id}/fix:
    post:
      operationId: fixReviewQueueEntry
      summary: Fix event dates and approve
      description: |
        Apply date corrections to an event and approve it for publication.
        This endpoint is intended for fixing date-related issues detected during normalization.
        
        Note: Currently this endpoint only marks the review as approved with correction notes.
        Full date correction implementation is tracked in srv-trg.
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Review queue entry ID
          schema:
            type: integer
            minimum: 1
      requestBody:
        description: Date corrections to apply to the event (startDate and/or endDate)
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [corrections]
              properties:
                corrections:
                  type: object
                  description: Date corrections to apply
                  properties:
                    startDate:
                      type: string
                      format: date-time
                      description: Corrected start date
                    endDate:
                      type: string
                      format: date-time
                      description: Corrected end date
                notes:
                  type: string
                  description: Optional notes about the corrections
            examples:
              fixEndDate:
                summary: Fix reversed end date
                value:
                  corrections:
                    endDate: "2026-03-15T22:00:00Z"
                  notes: "Added 24 hours to fix reversed dates"
              fixBothDates:
                summary: Fix both dates
                value:
                  corrections:
                    startDate: "2026-03-15T19:00:00Z"
                    endDate: "2026-03-15T22:00:00Z"
                  notes: "Corrected timezone offset"
      responses:
        '200':
          description: Dates corrected and review approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewQueueDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Review entry has already been processed
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '410':
          description: Event has been deleted
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

