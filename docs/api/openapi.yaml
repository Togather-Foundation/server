openapi: 3.1.0
info:
  title: Shared Events Library (SEL) API
  version: 1.0.0
  description: |
    RESTful API for the Shared Events Library, a federated events commons 
    enabling discovery, submission, and management of cultural events.
    
    ## Getting an API Key
    
    **Public read access:** No authentication required for reading events, places, or organizations.
    
    **Authenticated write access:** To submit or manage events, you need an API key.
    
    ### Two Onboarding Paths
    
    #### Option 1: Self-Service via GitHub OAuth (Instant)
    
    1. Visit `/dev/login` and click "Sign in with GitHub"
    2. Authorize the app on GitHub
    3. Your developer account is automatically created
    4. Navigate to `/dev/api-keys` to create your first API key
    
    #### Option 2: Email Invitation (Email/Password)
    
    1. **Request an invitation:** Email [info@togather.foundation](mailto:info@togather.foundation) with:
       - Your name
       - Email address
       - Intended use case
    
    2. **Accept invitation:**
       - Check your email for the invitation link (valid for 7 days)
       - Set your password and display name
       - You'll be logged in to the developer dashboard at `/dev/login`
    
    3. **Create an API key:**
       - Navigate to `/dev/api-keys`
       - Click "Create New Key"
       - Enter a descriptive name
       - Copy the key immediately (shown only once)
       - Store securely (environment variable or secret manager)
    
    ### Using Your API Key
    
    **Via Web Interface:**
    1. Navigate to `/dev/api-keys`
    2. Click "Create New Key"
    3. Enter a descriptive name
    4. Copy the key immediately (shown only once)
    5. Store securely (environment variable or secret manager)
    
    **Via API:**
    ```bash
    # First, get your JWT token (if using email/password)
    curl -X POST https://toronto.togather.foundation/api/v1/dev/login \
         -H "Content-Type: application/json" \
         -d '{"email": "your-email@example.com", "password": "your-password"}'
    
    # Then create a key
    curl -X POST https://toronto.togather.foundation/api/v1/dev/api-keys \
         -H "Authorization: Bearer $YOUR_JWT_TOKEN" \
         -H "Content-Type: application/json" \
         -d '{"name": "My Event Scraper"}'
    ```
    
    ### Making Authenticated Requests
    
    **Reading events (no auth):**
    ```bash
    curl https://toronto.togather.foundation/api/v1/events
    ```
    
    **Submitting events (with API key):**
    ```bash
    curl -X POST https://toronto.togather.foundation/api/v1/events \
         -H "Authorization: Bearer your_api_key_here" \
         -H "Content-Type: application/ld+json" \
         -d @event.json
    ```
    
    **For complete guidance**, see:
    - [Developer Quick Start](https://github.com/Togather-Foundation/server/blob/main/docs/integration/DEVELOPER_QUICKSTART.md) (4-step onboarding)
    - [Authentication Guide](https://github.com/Togather-Foundation/server/blob/main/docs/integration/AUTHENTICATION.md) (comprehensive auth docs)
    - [API Guide](https://github.com/Togather-Foundation/server/blob/main/docs/integration/API_GUIDE.md) (endpoint reference)
    
    ## Authentication
    - **Public**: No authentication required for read endpoints
    - **Agents**: API key in `Authorization: Bearer <key>` header
    - **Admins**: JWT token in `Authorization: Bearer <token>` header
    - **Developers**: JWT token in `dev_auth_token` cookie or `Authorization: Bearer <token>` header

    ## Rate Limits
    All public (unauthenticated) read endpoints share a single rate limit tier, configurable
    via `RATE_LIMIT_PUBLIC` (default 60 requests per minute per IP). Individual endpoints
    may have tighter per-endpoint limits:
    - `POST /api/v1/dev/login`: configurable via `RATE_LIMIT_LOGIN`, default 5 attempts per 15-minute window per IP
    - `POST /scraper/submissions`: configurable via `RATE_LIMIT_SUBMISSIONS_PER_IP_PER_24H`, default 20 URLs per 24 hours per IP
    
    ## Content Negotiation
    API endpoints return JSON/JSON-LD via `Accept` header:
    - `application/ld+json` - JSON-LD (default)
    - `application/json` - JSON-LD (alias)
    
    ## Pagination
    List endpoints use cursor-based pagination with `after` and `limit` parameters.
    Default limit is 50, maximum is 200.
    
    ### Cursor Format
    Cursors are opaque base64url-encoded strings (RFC 4648, URL-safe, no padding).
    - **Event cursors**: Encode timestamp + ULID for stable ordering
    - **Change feed cursors**: Encode sequence number for federation sync
    
    **Important**: Treat cursors as opaque strings. Use the `next_cursor` value from
    API responses as-is. Do not parse, decode, or modify cursor values.
    
    Example pagination:
    ```
    GET /api/v1/events?limit=50
    -> returns { items: [...], next_cursor: "MTcwNjg4NjAwMD..." }
    
    GET /api/v1/events?limit=50&after=MTcwNjg4NjAwMD...
    -> returns next page
    ```
  contact:
    name: SEL Team
    url: https://togather.foundation
    email: hello@togather.foundation
  license:
    name: CC0 1.0
    url: https://creativecommons.org/publicdomain/zero/1.0/

servers:
  - url: https://{node}/api/v1
    description: SEL Node API
    variables:
      node:
        default: toronto.togather.foundation
        description: SEL node domain

tags:
  - name: Admin
    description: Administrative operations (requires admin auth)
  - name: Developer
    description: Developer self-service API key management
  - name: Events
    description: Event discovery and submission
  - name: Feeds
    description: Change feeds for federation
  - name: Health
    description: Health check endpoints
  - name: OAuth
    description: GitHub OAuth authentication
  - name: Organizations
    description: Organizer information
  - name: Places
    description: Venue information

paths:
  /events:
    get:
      operationId: listEvents
      summary: List events
      description: Query events with optional filters. Returns paginated JSON-LD.
      tags: [Events]
      security: []
      parameters:
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - $ref: '#/components/parameters/city'
        - $ref: '#/components/parameters/venueId'
        - $ref: '#/components/parameters/organizerId'
        - $ref: '#/components/parameters/lifecycleState'
        - $ref: '#/components/parameters/eventDomain'
        - $ref: '#/components/parameters/query'
        - $ref: '#/components/parameters/keywords'
        - $ref: '#/components/parameters/after'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Paginated list of events
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

    post:
      operationId: createEvent
      summary: Submit a new event
      description: |
        Submit a new event to the library. Requires agent or admin authentication.
        Events are auto-published immediately and appear in admin review queue
        if flagged or low-confidence.
      tags: [Events]
      security:
        - apiKey: []
        - bearerAuth: []
      requestBody:
        description: Event data in JSON-LD or JSON format
        required: true
        content:
          application/ld+json:
            schema:
              $ref: '#/components/schemas/EventInput'
          application/json:
            schema:
              $ref: '#/components/schemas/EventInput'
      responses:
        '201':
          description: Event created successfully
          headers:
            Location:
              description: URI of the created event
              schema:
                type: string
                format: uri
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Duplicate event (idempotent - returns existing event)
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/Event'

  /events/{id}:
    get:
      operationId: getEvent
      summary: Get event by ID
      description: Retrieve a single event by its ULID. Supports content negotiation.
      tags: [Events]
      security: []
      parameters:
        - $ref: '#/components/parameters/eventId'
      responses:
        '200':
          description: Event details
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          $ref: '#/components/responses/NotFound'

  /events/batch:
    post:
      operationId: createEventBatch
      summary: Submit multiple events in a batch
      description: |
        Submit multiple events for background processing. Returns immediately with a batch ID
        and job status URL. Use the batch status endpoint to check processing results.
        
        Maximum batch size: 100 events. Each event in the batch is processed independently,
        with individual success/failure tracking.
      tags: [Events]
      security:
        - apiKey: []
        - bearerAuth: []
      requestBody:
        description: Array of events for batch processing (max 100 events)
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - events
              properties:
                events:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    $ref: '#/components/schemas/EventInput'
      responses:
        '202':
          description: Batch accepted for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@context':
                    type: string
                  '@type':
                    type: string
                    enum: [BatchSubmission]
                  batch_id:
                    type: string
                    description: Unique identifier for this batch submission
                  job_id:
                    type: integer
                    description: River job queue ID
                  status:
                    type: string
                    enum: [processing]
                  status_url:
                    type: string
                    format: uri
                    description: URL to check batch processing status
                  submitted:
                    type: integer
                    description: Number of events in the batch
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /batch-status/{id}:
    get:
      operationId: getBatchStatus
      summary: Get batch processing status
      description: |
        Retrieve the status and results of a batch event submission. Returns 404 if
        the batch is still processing or doesn't exist.
      tags: [Events]
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Batch ID returned from batch submission
      responses:
        '200':
          description: Batch processing completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@context':
                    type: string
                  '@type':
                    type: string
                    enum: [BatchSubmissionResult]
                  batch_id:
                    type: string
                  status:
                    type: string
                    enum: [completed]
                  completed_at:
                    type: string
                    format: date-time
                  total:
                    type: integer
                    description: Total number of events processed
                  created:
                    type: integer
                    description: Number of events successfully created
                  failed:
                    type: integer
                    description: Number of events that failed validation/processing
                  duplicates:
                    type: integer
                    description: Number of duplicate events detected
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                          description: Index of event in original batch array
                        status:
                          type: string
                          enum: [created, failed, duplicate]
                        event_id:
                          type: string
                          description: ULID of created/duplicate event (if successful)
                        error:
                          type: string
                          description: Error message (if failed)
        '404':
          description: Batch not found or still processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

        '410':
          $ref: '#/components/responses/Gone'

  /places:
    get:
      operationId: listPlaces
      summary: List places
      description: Query places (venues) with optional filters. Returns paginated JSON-LD.
      tags: [Places]
      security: []
      parameters:
        - $ref: '#/components/parameters/city'
        - $ref: '#/components/parameters/query'
        - $ref: '#/components/parameters/after'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Paginated list of places
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/PlaceListResponse'

  /places/{id}:
    get:
      operationId: getPlace
      summary: Get place by ID
      description: Retrieve a single place (venue) by its unique identifier. Returns JSON-LD.
      tags: [Places]
      security: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the place (ULID or URI)
          schema:
            type: string
      responses:
        '200':
          description: Place details
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/Place'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations:
    get:
      operationId: listOrganizations
      summary: List organizations
      description: Query organizations (event organizers) with optional filters. Returns paginated JSON-LD.
      tags: [Organizations]
      security: []
      parameters:
        - $ref: '#/components/parameters/query'
        - $ref: '#/components/parameters/after'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Paginated list of organizations
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/OrganizationListResponse'

  /organizations/{id}:
    get:
      operationId: getOrganization
      summary: Get organization by ID
      description: Retrieve a single organization by its unique identifier. Returns JSON-LD.
      tags: [Organizations]
      security: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the organization (ULID or URI)
          schema:
            type: string
      responses:
        '200':
          description: Organization details
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/Organization'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/events/pending:
    get:
      operationId: listPendingEvents
      summary: List events awaiting review
      description: Returns events flagged for admin review (low confidence, validation issues, etc.)
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/after'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Paginated list of pending events
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/events/{id}:
    put:
      operationId: updateEvent
      summary: Update an event
      description: Admin endpoint to edit event details. Increments version and logs change.
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/eventId'
      requestBody:
        description: Updated event data with version for optimistic locking
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventUpdateInput'
      responses:
        '200':
          description: Event updated
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Version conflict (optimistic locking)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

    delete:
      operationId: deleteEvent
      summary: Delete an event
      description: Soft delete - returns 410 Gone with tombstone thereafter
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/eventId'
      responses:
        '204':
          description: Event deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/events/consolidate:
    post:
      operationId: consolidateEvents
      summary: Atomically consolidate multiple events into one canonical event
      description: |
        Consolidate N events into a single canonical event in one atomic operation.
        Either creates a new canonical event (`event`) or promotes an existing one
        (`event_ulid`). All events listed in `retire` are soft-deleted with tombstones.
        Open review queue entries for retired events are dismissed automatically.

        Post-consolidation validation (duplicate detection, quality checks) runs on
        the canonical event; results are returned in `warnings`, `is_duplicate`, and
        `needs_review`. Near-duplicate detection after consolidation uses a similarity
        threshold configurable via DEDUP_NEAR_DUPLICATE_THRESHOLD (default 0.4).

        Exactly one of the following must hold:
        - `event_ulid` only: promote an existing event as canonical with no field changes.
        - `event_ulid` + `event`: promote an existing event as canonical AND apply field
          edits atomically inside the same transaction. Patchable fields: `name`,
          `description`, `url`, `image`, `keywords`, `eventDomain`. Fields ignored on the
          patch path: `startDate`, `endDate`, `doorTime`, `occurrences`, `source`,
          `lifecycle_state`, and scraper-only hints.
        - `event` only: create a new canonical event (full ingest pipeline).

        `retire` is required and must contain at least one ULID. The canonical event's
        ULID must not appear in the `retire` list.
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - retire
              properties:
                event:
                  description: >
                    When `event_ulid` is absent: full event payload to create a new
                    canonical event. When `event_ulid` is present: partial patch applied
                    atomically to the promoted canonical event. Patchable fields: name,
                    description, url, image, keywords, eventDomain. Occurrence-derived
                    and ingest-only fields (startDate, endDate, occurrences, source,
                    lifecycle_state) are ignored on the patch path.
                  $ref: '#/components/schemas/EventInput'
                event_ulid:
                  type: string
                  description: >
                    ULID of an existing event to promote as the canonical event.
                    May be combined with `event` to apply field edits atomically.
                retire:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  description: >
                    Event ULIDs to soft-delete with tombstones. All must exist and
                    not already be deleted. Required, minimum 1 entry.
                transfer_occurrences:
                  type: boolean
                  default: false
                  description: >
                    If true, occurrences are copied from each retired event to the
                    canonical event before retirement. Returns 409 if any occurrence
                    would overlap an existing one on the canonical. Default false
                    (Merge Duplicate path — retire only, no occurrence transfer).
      responses:
        '200':
          description: Consolidation succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsolidateResponse'
        '400':
          description: |
            Invalid request. Possible reasons:
            - Neither `event` nor `event_ulid` was provided
            - `retire` list is empty or missing
            - Canonical event's ULID appears in `retire`
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Retire target or canonical event not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: |
            An occurrence from a retired event overlaps an existing occurrence on
            the canonical event (only when transfer_occurrences is true).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: |
            Unprocessable request. Possible reasons:
            - One or more retire targets are already deleted
            - The canonical event has been deleted
            - Validation error in the provided event payload
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /admin/events/{id}/occurrences:
    post:
      operationId: createOccurrence
      summary: Add an occurrence to an event
      description: |
        Create a new occurrence on an existing event. The event must not be deleted.
        Returns 409 if the new occurrence overlaps an existing occurrence on the event.
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/eventId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OccurrenceInput'
      responses:
        '201':
          description: Occurrence created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OccurrenceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Occurrence overlaps an existing occurrence
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '410':
          description: Event has been deleted
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Validation error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /admin/events/{id}/occurrences/{occurrenceId}:
    put:
      operationId: updateOccurrence
      summary: Update an occurrence on an event
      description: |
        Update an existing occurrence. Supports partial updates via nullable fields.
        Returns 409 if the updated occurrence would overlap another occurrence on the event.
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/eventId'
        - name: occurrenceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the occurrence to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OccurrenceInput'
      responses:
        '200':
          description: Occurrence updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OccurrenceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Occurrence overlaps an existing occurrence
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '410':
          description: Event has been deleted
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Validation error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

    delete:
      operationId: deleteOccurrence
      summary: Delete an occurrence from an event
      description: |
        Remove a single occurrence from an event. The last occurrence of an event
        cannot be deleted (returns 422); delete the event itself instead.
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/eventId'
        - name: occurrenceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the occurrence to delete
      responses:
        '204':
          description: Occurrence deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          description: Event has been deleted
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Cannot delete the last occurrence of an event
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /admin/api-keys:
    get:
      operationId: listApiKeys
      summary: List API keys
      description: Retrieve all API keys (without secrets). Requires admin authentication.
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of API keys (without secrets)
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiKeyInfo'

    post:
      operationId: createApiKey
      summary: Create a new API key
      description: Generate a new API key for agent authentication. Returns the API key secret only once. Requires admin authentication.
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      requestBody:
        description: API key name and optional metadata (sourceId, expiresAt)
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                sourceId:
                  type: string
                  format: uuid
                expiresAt:
                  type: string
                  format: date-time
      responses:
        '201':
          description: API key created (secret shown once)
          content:
            application/json:
