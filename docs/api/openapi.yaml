      summary: OpenAPI specification
      description: Retrieve the OpenAPI 3.1 specification for this API in JSON format. Useful for API documentation and client generation.
      tags: [Health]
      security: []
      responses:
        '200':
          description: OpenAPI 3.1 specification
          content:
            application/json:
              schema:
                type: object

  /admin/scraper/sources:
    get:
      operationId: listScraperSources
      summary: List scraper sources
      description: |
        Returns all scraper sources with their latest run summary (status, counts,
        error message). Supports optional filtering by enabled state.
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      parameters:
        - name: enabled
          in: query
          description: Filter by enabled state. Omit to return all sources.
          schema:
            type: boolean
      responses:
        '200':
          description: List of scraper sources
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScraperSourceSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /admin/scraper/sources/{name}:
    patch:
      operationId: setScraperSourceEnabled
      summary: Enable or disable a scraper source
      description: |
        Enables or disables the named scraper source. Returns the updated source.
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          description: Scraper source name
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: Updated scraper source
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScraperSourceSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /admin/scraper/sources/{name}/runs:
    get:
      operationId: listScraperSourceRuns
      summary: List run history for a scraper source
      description: |
        Returns the most recent runs for the named scraper source (up to 50).
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          description: Scraper source name
          schema:
            type: string
      responses:
        '200':
          description: List of scraper runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScraperRunDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /admin/scraper/sources/{name}/trigger:
    post:
      operationId: triggerScraperSource
      summary: Trigger an immediate scrape for a source
      description: |
        Dispatches a background scrape for the named source and returns 202
        immediately. Returns 503 if this node has no scraper configured, and 404
        if the source name is unknown.
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          description: Scraper source name
          schema:
            type: string
      responses:
        '202':
          description: Scrape triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  source_name:
                    type: string
                  status:
                    type: string
                    example: triggered
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '503':
          description: Scraper not configured on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /admin/scraper/trigger-all:
    post:
      operationId: triggerAllScraperSources
      summary: Trigger a serial scrape run for all eligible sources
      description: |
        Queues an orchestrator job that serially scrapes all enabled sources with
        daily or weekly schedules. Returns immediately with 202 after queuing.

        Options:
        - `respect_auto_scrape` (default: true): If true and global auto_scrape is disabled, skip the run
        - `skip_up_to_date` (default: true): Skip sources with fresh runs (daily <24h, weekly <7d)
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                respect_auto_scrape:
                  type: boolean
                  default: true
                skip_up_to_date:
                  type: boolean
                  default: true
      responses:
        '202':
          description: Orchestrator job queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: triggered
                  respect_auto_scrape:
                    type: boolean
                  skip_up_to_date:
                    type: boolean
                  orchestrator_job_id:
                    type: integer
        '200':
          description: Run skipped (auto_scrape disabled and respect_auto_scrape=true)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: skipped
                  respect_auto_scrape:
                    type: boolean
                  skip_up_to_date:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '503':
          description: Job queue not available on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /scraper/submissions:
    post:
      operationId: submitURLs
      summary: Submit URLs for scraping
      description: |
        Submits up to 10 URLs for review and eventual scraping. No authentication
        required. Rate limited to 20 URLs per IP per 24 hours (configurable via
        `RATE_LIMIT_SUBMISSIONS_PER_IP_PER_24H`).

        Each URL is normalised and deduplicated before insertion. The response
        includes a per-URL result indicating whether the URL was accepted,
        already exists (duplicate), or rejected (invalid URL).
      tags: [Scraper]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [urls]
              properties:
                urls:
                  type: array
                  items:
                    type: string
                    format: uri
                  minItems: 1
                  maxItems: 10
                  example:
                    - https://www.toronto.ca/events-calendar/
            example:
              urls:
                - https://www.toronto.ca/events-calendar/
      responses:
        '200':
          description: Submission results, one entry per submitted URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/SubmissionResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          description: Rate limit exceeded — retry after 24 hours
          headers:
            Retry-After:
              schema:
                type: integer
                example: 86400
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /admin/scraper/events:
    get:
      operationId: streamScraperEvents
      summary: Stream scraper job events
      description: |
        Server-Sent Events stream of River job lifecycle events for scraper jobs.
        Clients receive events when scrape_source jobs complete, fail, or are cancelled.
        Maintains a keepalive comment every 15 seconds to prevent proxy timeouts.
        Protected by admin cookie auth (same-origin EventSource sends cookies automatically).
      tags: [Admin]
      x-internal: true
      security:
        - cookieAuth: []
      responses:
        '200':
          description: SSE stream of scraper job events
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Newline-delimited SSE stream. Each event has the form:
                    id: <job_id>
                    data: {"kind":"job_completed","job_kind":"scrape_source","source_name":"<name>","job_id":<id>}

                  Keepalive comments (`: keepalive`) are sent every 15 seconds.
                  A `retry: 5000` directive is sent on connection.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Streaming not supported

  /admin/scraper/submissions:
    get:
      operationId: listScraperSubmissions
      summary: List URL submissions
      description: |
        Returns a paginated list of URL submissions. Optionally filter by status.
        Useful for the admin review queue.
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          description: |
            Filter by submission status. One of: `pending_validation`, `pending`,
            `processed`, `rejected`.
          schema:
            type: string
            enum: [pending_validation, pending, processed, rejected]
        - name: limit
          in: query
          description: Maximum number of results (1–200, default 50).
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          description: Number of results to skip (default 0).
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Paginated list of submissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  submissions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Submission'
                  total:
                    type: integer
                    description: Total number of submissions matching the filter
                  limit:
                    type: integer
                  offset:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /admin/scraper/submissions/{id}:
    patch:
      operationId: updateScraperSubmission
      summary: Review a URL submission
      description: |
        Marks a submission as `processed` (accepted for scraping) or `rejected`,
        optionally adding admin notes. Only submissions with status `pending` may
        be reviewed.
      tags: [Admin]
      x-internal: true
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [processed, rejected]
                  description: New status for the submission
                notes:
                  type: [string, 'null']
                  description: Optional admin notes
            example:
              status: processed
              notes: "Good source — add to weekly scrape rotation"
      responses:
        '200':
          description: Updated submission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Submission'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

components:
  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      description: API key for agent access
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for admin access
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth_token
      description: Admin JWT token in HttpOnly cookie (used by same-origin SSE endpoints)
    devCookie:
      type: apiKey
      in: cookie
      name: dev_auth_token
      description: Developer JWT token in HttpOnly cookie
    devJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Developer JWT token for API access

  parameters:
    eventId:
      name: id
      in: path
      required: true
      description: Event ULID
      schema:
        type: string
        pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'

    startDate:
      name: startDate
      in: query
      description: >
        Filter events starting on or after this date (ISO8601, e.g. 2026-06-01).
        Defaults to today when neither startDate nor endDate is provided, so past events
        are excluded by default. "Today" is midnight in the server timezone
        (configurable via DEFAULT_TIMEZONE, default America/Toronto).
        Pass an explicit startDate to override.
        Snake_case alias start_date is accepted but triggers a warnings entry in the response.
      schema:
        type: string
        format: date

    endDate:
      name: endDate
      in: query
      description: >
        Filter events starting on or before this date (ISO8601, e.g. 2026-06-30).
        Snake_case alias end_date is accepted but triggers a warnings entry in the response.
      schema:
        type: string
        format: date

    city:
      name: city
      in: query
      description: Filter by city/locality
      schema:
        type: string

    venueId:
      name: venueId
      in: query
      description: >
        Filter by venue ULID.
        Snake_case alias venue_id is accepted but triggers a warnings entry in the response.
      schema:
        type: string

    organizerId:
      name: organizerId
      in: query
      description: >
        Filter by organizer ULID.
        Snake_case alias organizer_id is accepted but triggers a warnings entry in the response.
      schema:
        type: string

    lifecycleState:
      name: state
      in: query
      description: Filter by lifecycle state
      schema:
        type: string
        enum: [draft, published, postponed, rescheduled, sold_out, cancelled, completed]

    eventDomain:
      name: domain
      in: query
      description: Filter by event domain
      schema:
        type: string
        enum: [arts, music, culture, sports, community, education, general]

    query:
      name: q
      in: query
      description: Free-text search on name and description
      schema:
        type: string

    keywords:
      name: keywords
      in: query
      description: Filter by keywords (comma-separated)
      schema:
        type: string

    after:
      name: after
      in: query
      description: |
        Opaque cursor for pagination (obtained from previous response's `next_cursor`).
        Cursors are base64url-encoded strings - treat as opaque, do not parse or modify.
        Example: `MTcwNjg4NjAwMDAwMDAwMDAwMDowMUhZWDNLUVc3RVJUV jlYTkJNMlA4UUpaRg`
      schema:
        type: string
        example: "MTcwNjg4NjAwMDAwMDAwMDAwMDowMUhZWDNLUVc3RVJUV jlYTkJNMlA4UUpaRg"

    limit:
      name: limit
      in: query
      description: Maximum results per page (default 50, max 200)
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

  schemas:
    ConsolidateResponse:
      type: object
      description: Result of an atomic event consolidation operation
      properties:
        event:
          description: The canonical event after consolidation
          $ref: '#/components/schemas/Event'
        lifecycle_state:
          type: string
          enum: [published, pending_review, draft]
          description: Lifecycle state of the canonical event after consolidation
        is_duplicate:
          type: boolean
          description: >
            True if the canonical event was flagged as a near-duplicate of another
            non-retired event during post-consolidation validation.
        is_merged:
          type: boolean
          description: >
            Always false for consolidation (admin intent is preserved, never auto-merged).
        needs_review:
          type: boolean
          description: >
            True if the canonical event was sent to the review queue due to duplicate
            detection or quality issues found during post-consolidation validation.
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ValidationWarning'
          description: Validation warnings from post-consolidation checks
        retired:
          type: array
          items:
            type: string
          description: ULIDs of events that were successfully retired (soft-deleted)
        review_entries_dismissed:
          type: array
          items:
            type: integer
          description: IDs of review queue entries that were dismissed for retired events

    OccurrenceInput:
      type: object
      description: Input for creating or updating an event occurrence
      properties:
        start_time:
          type: string
          format: date-time
          description: Start time of the occurrence (RFC3339)
        end_time:
          type: [string, 'null']
          format: date-time
          description: End time of the occurrence (RFC3339), or null to clear
        door_time:
          type: [string, 'null']
          format: date-time
          description: Door open time (RFC3339), or null to clear
        timezone:
          type: string
          description: IANA timezone identifier (e.g. America/New_York)
        venue_ulid:
          type: [string, 'null']
          description: ULID of the venue for this occurrence, or null to clear
        virtual_url:
          type: [string, 'null']
          format: uri
          description: URL for virtual/hybrid attendance, or null to clear
        ticket_url:
          type: [string, 'null']
          format: uri
          description: URL for purchasing tickets, or null to clear
        price_min:
          type: [number, 'null']
          description: Minimum ticket price (inclusive), or null to clear
        price_max:
          type: [number, 'null']
          description: Maximum ticket price, or null to clear
        price_currency:
          type: string
          description: ISO 4217 currency code (e.g. USD)
        availability:
          type: string
          enum: [available, sold_out, limited]
          description: Ticket availability status

    OccurrenceResponse:
      type: object
      description: An event occurrence as returned by the admin occurrence API
      properties:
        id:
          type: string
          format: uuid
          description: UUID of the occurrence
        start_time:
          type: string
          format: date-time
        end_time:
          type: [string, 'null']
          format: date-time
        door_time:
          type: [string, 'null']
          format: date-time
        timezone:
          type: string
        venue_id:
          type: [string, 'null']
          description: Internal UUID of the venue
        venue_ulid:
          type: [string, 'null']
          description: Public ULID of the venue
        virtual_url:
          type: [string, 'null']
          format: uri
        ticket_url:
          type: [string, 'null']
          format: uri
        price_min:
          type: [number, 'null']
        price_max:
          type: [number, 'null']
        price_currency:
          type: [string, 'null']
        availability:
          type: [string, 'null']

    Submission:
      type: object
      description: A URL submission record
      properties:
        id:
          type: integer
          format: int64
        url:
          type: string
          format: uri
          description: Original submitted URL
        url_norm:
          type: string
          format: uri
          description: Normalised URL (trailing slash stripped, lowercased scheme/host)
        submitted_at:
          type: string
          format: date-time
        submitter_ip:
          type: string
          description: IP address of the submitter
        status:
          type: string
          enum: [pending_validation, pending, processed, rejected]
        rejection_reason:
          type: [string, 'null']
          description: Set when the batch validator rejects the URL
        notes:
          type: [string, 'null']
          description: Admin review notes
        validated_at:
          type: [string, 'null']
          format: date-time
          description: Timestamp when the batch validator processed this submission

    SubmissionResult:
      type: object
      description: Per-URL result from the public submission endpoint
      properties:
        url:
          type: string
          format: uri
          description: The URL that was submitted
        status:
          type: string
          enum: [accepted, duplicate, rejected]
          description: |
            `accepted` — stored for validation; `duplicate` — already submitted
            recently; `rejected` — failed basic validation (invalid URL, etc.)
        message:
          type: string
          description: Human-readable explanation

    ScraperSourceSummary:
      type: object
      description: A scraper source with its latest run summary
      properties:
        id:
          type: integer
        name:
          type: string
        url:
          type: string
          format: uri
        tier:
          type: integer
        schedule:
          type: string
        license:
          type: string
        enabled:
          type: boolean
        last_run_status:
          type: string
        last_run_started_at:
          type: string
          format: date-time
        last_run_completed_at:
          type: string
          format: date-time
        last_run_events_found:
          type: integer
        last_run_events_new:
          type: integer
        last_run_events_dup:
          type: integer
        last_run_events_failed:
          type: integer
        last_run_error_message:
          type: string

    ScraperRunDetail:
      type: object
      description: A single scraper run record
      properties:
        id:
          type: integer
        source_name:
          type: string
        source_url:
          type: string
          format: uri
        tier:
          type: integer
        status:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        events_found:
          type: integer
        events_new:
          type: integer
        events_dup:
          type: integer
        events_failed:
          type: integer
        error_message:
          type: string

    Event:
      type: object
      description: A cultural event in Schema.org Event format with SEL extensions for provenance and federation
      required: ['@id', '@type', name, startDate, location]
      properties:
        '@context':
          oneOf:
            - type: string
            - type: array
              items:
                type: string
            - type: object
          description: |
            JSON-LD context. May be a string URL, an array of URLs, or an embedded context object.
            Per JSON-LD specification, all three forms are valid.
        '@id':
          type: string
          format: uri
          description: Canonical URI for this event
        '@type':
          type: string
          enum: [Event, EventSeries]
        name:
          type: string
        description:
          type: string
        eventStatus:
          type: string
          format: uri
        eventAttendanceMode:
          type: string
          format: uri
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        doorTime:
          type: string
          format: date-time
        location:
          $ref: '#/components/schemas/Place'
        organizer:
          $ref: '#/components/schemas/Organization'
        image:
          type: string
          format: uri
        url:
          type: string
          format: uri
        inLanguage:
          type: array
          items:
            type: string
        isAccessibleForFree:
          type: boolean
        offers:
          $ref: '#/components/schemas/Offer'
        sameAs:
          type: array
          items:
            type: string
            format: uri
        'sel:originNode':
          type: string
          format: uri
        'sel:ingestedAt':
          type: string
          format: date-time
        'sel:confidence':
          type: number
          minimum: 0
          maximum: 1
        license:
          type: string
          format: uri

    EventInput:
      type: object
      description: Input schema for creating or updating an event. Minimal required fields with optional Schema.org properties
      required: [name, startDate]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 500
          description: Event name (configurable via VALIDATION_MAX_EVENT_NAME_LENGTH, default 500)
        description:
          type: string
          maxLength: 10000
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        doorTime:
          type: string
          format: date-time
        location:
          oneOf:
            - $ref: '#/components/schemas/PlaceInput'
            - $ref: '#/components/schemas/VirtualLocationInput'
        virtualLocation:
          $ref: '#/components/schemas/VirtualLocationInput'
        organizer:
          $ref: '#/components/schemas/OrganizationInput'
        image:
          type: string
          format: uri
        url:
          type: string
          format: uri
        keywords:
          type: array
          items:
            type: string
        inLanguage:
          type: array
          items:
            type: string
        isAccessibleForFree:
          type: boolean
        offers:
          $ref: '#/components/schemas/OfferInput'
        source:
          $ref: '#/components/schemas/SourceInput'

    EventUpdateInput:
      description: Schema for updating an existing event with version control for optimistic locking
      allOf:
        - $ref: '#/components/schemas/EventInput'
        - type: object
          properties:
            version:
              type: integer
              description: Current version for optimistic locking
            lifecycleState:
              type: string
              enum: [draft, published, postponed, rescheduled, sold_out, cancelled, completed]

    Place:
      description: A physical location or venue where events occur, using Schema.org Place vocabulary
      type: object
      required: ['@type', name]
      properties:
        '@id':
          type: string
          format: uri
        '@type':
          type: string
          enum: [Place]
        name:
          type: string
        address:
          $ref: '#/components/schemas/PostalAddress'
        geo:
          $ref: '#/components/schemas/GeoCoordinates'
        telephone:
          type: string
        url:
          type: string
          format: uri
        sameAs:
          type: array
          items:
            type: string
            format: uri

    PlaceInput:
      description: Input schema for specifying event locations with address and geographic coordinates
      type: object
      required: [name]
      properties:
        '@id':
          type: string
          format: uri
          description: Reference to existing place by URI
        name:
          type: string
        streetAddress:
          type: string
        addressLocality:
          type: string
        addressRegion:
          type: string
        postalCode:
          type: string
        addressCountry:
          type: string
        latitude:
          type: number
        longitude:
          type: number

    VirtualLocationInput:
      description: Input schema for online/virtual event locations with URL
      type: object
      required: [url]
      properties:
        '@type':
          type: string
          enum: [VirtualLocation]
        url:
          type: string
          format: uri
        name:
          type: string

    PostalAddress:
      description: Physical mailing address using Schema.org PostalAddress vocabulary
      type: object
      properties:
        '@type':
          type: string
          enum: [PostalAddress]
        streetAddress:
          type: string
        addressLocality:
          type: string
        addressRegion:
          type: string
        postalCode:
          type: string
        addressCountry:
          type: string

    GeoCoordinates:
      description: Geographic coordinates (latitude/longitude) using Schema.org GeoCoordinates vocabulary
      type: object
      properties:
        '@type':
          type: string
          enum: [GeoCoordinates]
        latitude:
          type: number
        longitude:
          type: number

    Organization:
      description: An organization or person that organizes events, using Schema.org Organization vocabulary
      type: object
      required: ['@type', name]
      properties:
        '@id':
          type: string
          format: uri
        '@type':
          type: string
          enum: [Organization]
        name:
          type: string
        alternateName:
          type: string
        url:
          type: string
          format: uri
        sameAs:
          type: array
          items:
            type: string
            format: uri

    OrganizationInput:
      description: Input schema for specifying event organizers
      type: object
      required: [name]
      properties:
        '@id':
          type: string
          format: uri
        name:
          type: string
        url:
          type: string
          format: uri

    Offer:
      description: Ticketing or pricing information using Schema.org Offer vocabulary
      type: object
      properties:
        '@type':
          type: string
          enum: [Offer]
        url:
          type: string
          format: uri
        price:
          type: string
        priceCurrency:
          type: string
        availability:
          type: string
          format: uri

    OfferInput:
      description: Input schema for ticket/pricing offers
      type: object
      properties:
        url:
          type: string
          format: uri
        price:
          type: string
        priceCurrency:
          type: string
          default: CAD

    SourceInput:
      description: Provenance metadata identifying the data source and attribution for submitted events
      type: object
      properties:
        url:
          type: string
          format: uri
          description: Source URL for provenance
        eventId:
          type: string
          description: External system's event ID

    EventListResponse:
      description: Paginated list of events with cursor-based pagination
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        next_cursor:
          type: string
          description: Cursor for next page
        warnings:
          type: array
          items:
            type: string
          description: >
            Parameter alias warnings. Present when a snake_case alias (e.g. start_date) was
            used instead of the canonical camelCase name. Each entry names the alias used and
            the correct parameter name. Omitted when no aliases were detected.

    PlaceListResponse:
      description: Paginated list of places (venues) with cursor-based pagination
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Place'
        next_cursor:
          type: string
        warnings:
          type: array
          items:
            type: string
          description: Parameter alias warnings. See EventListResponse.warnings for details.

    OrganizationListResponse:
      description: Paginated list of organizations with cursor-based pagination
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Organization'
        next_cursor:
          type: string
        warnings:
          type: array
          items:
            type: string
          description: Parameter alias warnings. See EventListResponse.warnings for details.

    ChangeFeedResponse:
      description: Federation change feed containing sequential updates for event synchronization
      type: object
      required: [cursor, changes]
      properties:
        cursor:
          type: string
          description: Current cursor position
        changes:
          type: array
          items:
            $ref: '#/components/schemas/ChangeEntry'
        next_cursor:
          type: string
          description: Cursor for next page

    ChangeEntry:
      description: Single change record in the federation feed with action type and snapshot
      type: object
      required: [action, uri, changed_at]
      properties:
        action:
          type: string
          enum: [create, update, delete]
        uri:
          type: string
          format: uri
        changed_at:
          type: string
          format: date-time
        changed_fields:
          type: array
          items:
            type: string
        snapshot:
          $ref: '#/components/schemas/Event'

    ApiKeyInfo:
      description: API key metadata (without secret) for agent authentication management
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        prefix:
          type: string
          description: First 8 chars of key
        sourceId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        isActive:
          type: boolean

    ApiKeyCreated:
      description: Response when creating a new API key, includes the secret (shown only once)
      allOf:
        - $ref: '#/components/schemas/ApiKeyInfo'
        - type: object
          required: [key]
          properties:
            key:
              type: string
              description: Full API key (shown only once)

    ReviewQueueListResponse:
      description: Paginated list of events awaiting admin review
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReviewQueueItem'
        next_cursor:
          type: string
          description: Cursor for next page (review queue entry ID)

    ReviewQueueItem:
      description: Summary of a review queue entry with event ID and reason for review
      type: object
      required: [id, eventId, warnings, status, createdAt]
      properties:
        id:
          type: integer
          description: Review queue entry ID
        eventId:
          type: string
          description: Event ULID
        eventName:
          type: string
          description: Name of the event (from original payload)
        eventStartTime:
          type: string
          format: date-time
          description: Event start time
        eventEndTime:
          type: string
          format: date-time
          description: Event end time
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ValidationWarning'
          description: Validation warnings that triggered review
        status:
          type: string
          enum: [pending, approved, rejected, merged]
          description: >
            Current review status. `pending` = awaiting decision; `approved` = event published;
            `rejected` = event deleted; `merged` = event absorbed into another event
            (via add-occurrence or consolidation).
        createdAt:
          type: string
          format: date-time
          description: When the entry was created
        reviewedBy:
          type: string
          description: Email of admin who reviewed (if reviewed)
        reviewedAt:
          type: string
          format: date-time
          description: When the review was completed (if reviewed)
        duplicateOfEventUlid:
          type: string
          description: >
            ULID of the primary event that this review entry was merged into or linked as a
            near-duplicate of. Set when the review action is add-occurrence or consolidation,
            and also when near-duplicate cross-linking creates a review entry for an existing
            published event.

        occurrenceCount:
          type: integer
          description: >
            Number of occurrences for the event. Fetched from the live event data
            to reflect current occurrence information.

    ReviewQueueDetail:
      description: Detailed review queue entry including original payload, normalized payload, and detected changes
      type: object
      required: [id, eventId, status, warnings, original, normalized, changes, createdAt, occurrences, relatedEvents]
      properties:
        id:
          type: integer
          description: Review queue entry ID
        eventId:
          type: string
          description: Event ULID
        status:
          type: string
          enum: [pending, approved, rejected, merged]
          description: >
            Current review status. `pending` = awaiting decision; `approved` = event published;
            `rejected` = event deleted; `merged` = event absorbed into another event
            (via add-occurrence or consolidation).
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ValidationWarning'
          description: Validation warnings that triggered review
        original:
          type: object
          description: Original event payload as submitted
        normalized:
          type: object
          description: Normalized event payload after corrections
        changes:
          type: array
          items:
            $ref: '#/components/schemas/ChangeDetail'
          description: List of changes made during normalization
        createdAt:
          type: string
          format: date-time
          description: When the entry was created
        reviewedBy:
          type: string
          description: Email of admin who reviewed (if reviewed)
        reviewedAt:
          type: string
          format: date-time
          description: When the review was completed (if reviewed)
        reviewNotes:
          type: string
          description: Notes from the reviewer (if approved with notes)
        rejectionReason:
          type: string
          description: Reason for rejection (if rejected)
        duplicateOfEventUlid:
          type: string
          description: >
            ULID of the primary event that this review entry was merged into or linked as a
            near-duplicate of. Set when the review action is add-occurrence or consolidation,
            and also when near-duplicate cross-linking creates a review entry for an existing
            published event.
        occurrences:
          type: array
          items:
            $ref: '#/components/schemas/EventOccurrence'
          description: List of occurrences for the event associated with this review entry
        relatedEvents:
          type: array
          items:
            $ref: '#/components/schemas/RelatedEvent'
          description: Related events identified from warnings or duplicate link

    EventOccurrence:
      description: A single occurrence (date/time/venue) of an event
      type: object
      required: [id, startTime, timezone]
      properties:
        id:
          type: string
          description: Occurrence UUID
        startTime:
          type: string
          format: date-time
          description: Start date and time of the occurrence
        endTime:
          type: [string, 'null']
          format: date-time
          description: End date and time of the occurrence (optional)
        timezone:
          type: string
          description: IANA timezone identifier (e.g., America/New_York)
        doorTime:
          type: [string, 'null']
          format: date-time
          description: Doors open time (optional)
        venueUlid:
          type: [string, 'null']
          description: ULID of the venue (optional)
        virtualUrl:
          type: [string, 'null']
          description: Virtual event URL (optional)
        ticketUrl:
          type: string
          description: URL to purchase tickets (optional)
        priceMin:
          type: [number, 'null']
          format: float
          description: Minimum ticket price (optional)
        priceMax:
          type: [number, 'null']
          format: float
          description: Maximum ticket price (optional)
        priceCurrency:
          type: string
          description: ISO 4217 currency code (e.g., USD)
        availability:
          type: string
          description: Availability status (e.g., InStock, OutOfStock)

    RelatedEvent:
      description: A related event identified from warnings or duplicate link, including full event data for side-by-side comparison
      type: object
      required: [ulid]
      properties:
        ulid:
          type: string
          description: ULID of the related event
        name:
          type: string
          description: Event name
        description:
          type: [string, 'null']
          description: Event description (optional)
        url:
          type: [string, 'null']
          description: Public URL of the event (optional)
        imageUrl:
          type: [string, 'null']
          description: Image URL for the event (optional)
        venueName:
          type: [string, 'null']
          description: Name of the primary venue (optional)
        venueUlid:
          type: [string, 'null']
          description: ULID of the primary venue (optional)
        venueStreetAddress:
          type: [string, 'null']
          description: Street address of the venue (optional)
        venueCity:
          type: [string, 'null']
          description: City of the venue (optional)
        venueRegion:
          type: [string, 'null']
          description: Province/region of the venue (optional)
        venuePostalCode:
          type: [string, 'null']
          description: Postal code of the venue (optional)
        organizerName:
          type: [string, 'null']
          description: Name of the organizer (optional)
        organizerUrl:
          type: [string, 'null']
          description: URL of the organizer (optional)
        occurrences:
          type: array
          items:
            $ref: '#/components/schemas/EventOccurrence'
          description: List of occurrences for the related event
        similarity:
          type: [number, 'null']
          format: float
          description: Similarity score from duplicate-warning details, if available (0–1)

    ValidationWarning:
      description: Warning message from event validation or normalization process
      type: object
      required: [code, message]
      properties:
        occurrences:
          type: array
          items:
            $ref: '#/components/schemas/EventOccurrence'
          description: >
            List of occurrences for the event under review. These are fetched from the
            live event data (not from the ingest snapshot) to ensure the UI shows current
            occurrence information for dedup decision-making. Empty if the event has no
            occurrences (e.g., single-instance long-duration occurrence).
        relatedEvents:
          type: array
          items:
            $ref: '#/components/schemas/RelatedEvent'
          description: >
            List of related events extracted from validation warnings (potential_duplicate,
            near_duplicate_of_new_event) and from the duplicateOfEventUlid field. Each entry
            includes full event data (name, description, URL, venue, occurrences, similarity)
            so the UI can render the side-by-side comparison panel without additional API calls.
            Used to determine which case applies (Case 1: empty list, Case 2/3: non-empty list).
        code:
          type: string
          description: Warning code (e.g., "REVERSED_DATES", "MISSING_END_DATE")
        message:
          type: string
          description: Human-readable warning message
        field:
          type: string
          description: Field path that triggered the warning
        severity:
          type: string
          enum: [info, warning, error]
          description: Warning severity level

    ChangeDetail:
      description: Record of a single field change made during event normalization
      type: object
      required: [field, original, corrected, reason]
      properties:
        field:
          type: string
          description: Field that was changed (e.g., "endDate")
        original:
          description: Original value before normalization (can be any type)
          example: "2026-03-15T22:00:00Z"
          anyOf:
            - type: string
            - type: number
            - type: boolean
            - type: object
            - type: array
            - type: "null"
        corrected:
          description: Corrected value after normalization (can be any type)
          example: "2026-03-16T22:00:00Z"
          anyOf:
            - type: string
            - type: number
            - type: boolean
            - type: object
            - type: array
            - type: "null"
        reason:
          type: string
          description: Explanation of why the change was made

    AdminUserResponse:
      type: object
      required: [id, username, email, role, is_active, status, created_at]
      description: Admin user representation returned by user management endpoints.
      properties:
        id:
          type: string
          format: uuid
          description: User's unique identifier
        username:
          type: string
          description: User's login username
        email:
          type: string
          format: email
          description: User's email address
        role:
          type: string
          enum: [admin, editor, viewer]
          description: User's role
        is_active:
          type: boolean
          description: Whether the user account is active
        status:
          type: string
          enum: [active, inactive, pending]
          description: "Derived user status. active: account is active; pending: account created but invitation not yet accepted (no password set); inactive: account was active but has been deactivated"
        created_at:
          type: string
          format: date-time
          description: When the user account was created
        last_login_at:
          type: [string, "null"]
          format: date-time
          description: When the user last logged in, or null if never

    ProblemDetails:
      type: object
      required: [type, title, status]
      description: RFC 7807 Problem Details
      properties:
        type:
          type: string
          format: uri
          description: URI identifying the problem type
          example: https://sel.events/problems/max-keys-exceeded
        title:
          type: string
          description: Short, human-readable summary
          example: Maximum API keys exceeded
        status:
          type: integer
          description: HTTP status code
          example: 409
        detail:
          type: string
          description: Human-readable explanation
          example: You have reached your maximum of 5 API keys. Revoke an existing key or contact an admin to increase your limit.
        instance:
          type: string
          description: URI identifying the specific occurrence
          example: /api/v1/dev/api-keys

    Developer:
      type: object
      description: Developer account with API key management capabilities
      required: [id, email, name, max_keys, is_active, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: Developer UUID
        email:
          type: string
          format: email
          description: Developer's email address
        name:
          type: string
          description: Developer's full name
        github_username:
          type: string
          description: GitHub username if linked via OAuth
        max_keys:
          type: integer
          minimum: 1
          maximum: 20
          description: Maximum API keys this developer can create
        is_active:
          type: boolean
          description: Whether the developer account is active
        created_at:
          type: string
          format: date-time
          description: When the developer account was created
        last_login_at:
          type: string
          format: date-time
          description: When the developer last logged in

    DeveloperAPIKey:
      type: object
      description: Developer-owned API key with usage statistics (secret not included)
      required: [id, name, prefix, role, is_active, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: API key UUID
        name:
          type: string
          description: Human-readable name for the key
        prefix:
          type: string
          description: First 8 characters of the key for identification
          example: 01KGJZ40
        role:
          type: string
          enum: [agent]
          description: API key role (always 'agent' for developer keys)
        is_active:
          type: boolean
          description: Whether the key is currently active
        created_at:
          type: string
          format: date-time
          description: When the key was created
        last_used_at:
          type: string
          format: date-time
          description: When the key was last used
        usage_today:
          type: integer
          description: Number of requests made today
          example: 1523
        usage_7d:
          type: integer
          description: Number of requests in the last 7 days
          example: 8420
        usage_30d:
          type: integer
          description: Number of requests in the last 30 days
          example: 34210

    DeveloperAPIKeyCreated:
      type: object
      description: Response when creating a new API key, includes full secret (shown only once)
      required: [id, name, prefix, key, role, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        prefix:
          type: string
          example: 01KGJZ40
        key:
          type: string
          description: Full API key secret (shown only once on creation)
          example: 01KGJZ40ZG0WQ5SQ...
        role:
          type: string
          enum: [agent]
        created_at:
          type: string
          format: date-time

    APIKeyUsage:
      type: object
      description: Detailed usage statistics for an API key over a date range
      required: [api_key_id, api_key_name, period, total_requests, total_errors, daily]
      properties:
        api_key_id:
          type: string
          format: uuid
          description: API key UUID
        api_key_name:
          type: string
          description: API key name
        period:
          type: object
          required: [from, to]
          properties:
            from:
              type: string
              format: date
              description: Start date of usage period
            to:
              type: string
              format: date
              description: End date of usage period
        total_requests:
          type: integer
          description: Total number of requests in the period
          example: 34210
        total_errors:
          type: integer
          description: Total number of errors (4xx/5xx) in the period
          example: 142
        daily:
          type: array
          description: Daily breakdown of usage statistics
          items:
            type: object
            required: [date, request_count, error_count]
            properties:
              date:
                type: string
                format: date
              request_count:
                type: integer
                example: 1523
              error_count:
                type: integer
                example: 3

    Tombstone:
      type: object
      description: Response for deleted entities (HTTP 410)
      properties:
        '@context':
          type: string
        '@type':
          type: string
        '@id':
          type: string
          format: uri
        eventStatus:
          type: string
          format: uri
        'sel:tombstone':
          type: boolean
        'sel:deletedAt':
          type: string
          format: date-time
        'sel:deletionReason':
          type: string
        'sel:supersededBy':
          type: string
          format: uri

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    Unauthorized:
      description: Authentication required
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    Forbidden:
      description: Insufficient permissions
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    Gone:
      description: Resource deleted
      content:
        application/ld+json:
          schema:
            $ref: '#/components/schemas/Tombstone'
