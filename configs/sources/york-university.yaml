name: "york-university"
# Modern Events Calendar (MEC) WordPress plugin with ICS feed
# Organization match: York University
# Platform: WordPress MEC (Modern Events Calendar)
# Extraction method: ICS (iCalendar feed via ?mec-ical-feed=1)
# 
# Previous issue: T2 headless scraping had date extraction problems due to MEC storing
# dates in parent data-mec-cell attributes rather than text content. Switched to ICS feed
# extraction which is more reliable and efficient.
# 
# Note: Site is very slow (often 60s+ to respond), requires longer timeout.
# ICS feed URL: https://events.yorku.ca/?mec-ical-feed=1
url: "https://events.yorku.ca/?mec-ical-feed=1"
extraction_method: "ics"
insecure_skip_verify: true
request_timeout: "120s"
max_body_bytes: 15000000
ics_start_date: "today"
schedule: "daily"
trust_level: 8
license: "CC0-1.0"
enabled: true
timezone: "America/Toronto"

