name: "st-lawrence-market"
# March 2026: Seasonal venue with no events currently scheduled. Site uses legacy jQuery
# AJAX to load events dynamically (loadPiece() → .event_list). Tested with T2 headless
# using wait_network_idle: true + undetected: true to bypass anti-bot skeleton. Page
# renders fully (22.5 KB) but AJAX endpoint returns "No Record Found". Re-enable in
# April-October when market has programming. Contact: City of Toronto open data / venue.
url: "https://www.stlawrencemarket.com/events/"
tier: 2
schedule: "daily"
trust_level: 7
license: "CC0-1.0"
enabled: false
headless:
  wait_selector: ".event_list > div"
  wait_timeout_ms: 20000
  wait_network_idle: true
  undetected: true
selectors:
  event_list: ".event_list > div"
  name: "strong a"
  start_date: ".event_date"
  url: "strong a"
