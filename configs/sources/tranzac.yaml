name: "tranzac"
# Tranzac Club (Toronto). Nuxt.js + DatoCMS SPA.
# Tier 3 (GraphQL): queries DatoCMS directly for structured event data with ISO dates.
# Public read-only token embedded in page JS.
url: "https://tranzac.org/calendar"
tier: 3
schedule: "daily"
trust_level: 7
license: "CC0-1.0"
enabled: true
graphql:
  endpoint: "https://graphql.datocms.com/"
  token: "045a924c6d43923a1572e41cb866b0"
  query: |
    {
      allEvents {
        title
        startDate
        endDate
        slug
        description
        photo { url }
        rooms { name }
      }
    }
  event_field: "allEvents"
  timeout_ms: 30000
  url_template: "https://tranzac.org/events/{{.slug}}"
