name: "toronto-symphony-orchestra"
# Tier 2 headless scraper for TSO calendar listing at /concerts-and-events/calendar.
# Events are rendered by a React SPA after an AJAX call; the calendar-performance
# elements appear once the JS completes. Date is extracted from the id attribute
# (id="date-YYYY-MM-DD") on each a.calendar-performance link.
url: "https://www.tso.ca/concerts-and-events/calendar"
tier: 2
schedule: "daily"
trust_level: 8
license: "CC0-1.0"
enabled: true
max_pages: 5
# TSO performs at Roy Thomson Hall and Koerner Hall; the calendar listing does
# not include structured location data, so use Roy Thomson Hall as the fallback.
default_location:
  name: "Roy Thomson Hall"
  street_address: "60 Simcoe St"
  address_locality: "Toronto"
  address_region: "ON"
  postal_code: "M5J 1W2"
  address_country: "CA"
headless:
  wait_selector: ".calendar-performance"
  wait_timeout_ms: 20000
selectors:
  event_list: "li:has(a.calendar-performance)"
  name: "h4.calendar-performance__title"
  start_date: "a.calendar-performance"
  url: "a.calendar-performance"
