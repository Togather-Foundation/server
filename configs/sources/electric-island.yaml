name: "electric-island"
# Tier 2 (headless). Webflow CMS — artist/event cards at /artists page.
# Each card: div.artist-collection-item with artist name, date, stage info.
# Date is inside div.date_stage_wrap as second div.u-text-large (e.g. "May 16, 2026").
# Festival runs May–August; cards visible year-round as seasonal lineup.
# Organization match: Electric Island (seasonal Toronto music festival)
url: "https://www.electricisland.to/artists"
tier: 2
schedule: "weekly"
trust_level: 7
license: "CC0-1.0"
enabled: true
max_pages: 1
headless:
  wait_selector: "div.artist-collection-item"
  wait_timeout_ms: 15000
selectors:
  event_list: "div.artist-collection-item"
  name: "div.u-h3"
  start_date: "div.date_stage_wrap"
  url: "a.artist_card"
