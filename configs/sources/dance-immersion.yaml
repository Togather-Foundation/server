name: "dance-immersion"
# WordPress category archive; article.post-entry containers with time.date-container
# (datePublished, ISO 8601 datetime attr). /events/ slider has no dates.
# Date is post-publication date, not performance date — acceptable for discovery.
url: "https://danceimmersion.ca/category/events/"
tier: 1
schedule: "weekly"
trust_level: 6
license: "CC0-1.0"
enabled: true
max_pages: 3
selectors:
  event_list: "article.post-entry"
  name: "h2.entry-title a"
  start_date: "time.date-container"
  url: "h2.entry-title a"
