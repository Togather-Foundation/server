name: "gardiner-museum"
# Tier 1 (Colly CSS selectors). Gardiner Museum (ceramics).
# Most events (5 of 7) display dates in .article-subtitle h4 which works.
# Two events have no specific dates in the listing page CSS:
# - "In Search of Imperfection" (ongoing exhibition): .article-subtitle contains "Ongoing"
# - "Family Day" (recurring weekly program): .article-subtitle contains "Sundays, 11:00 am – 3:00 pm"
# These are legitimately recurring/ongoing events without singular event dates in the listing.
# Detail pages have dates in JSON-LD, but follow_event_urls extraction not yet supported.
url: "https://www.gardinermuseum.on.ca/whats-on/"
tier: 1
schedule: "daily"
trust_level: 8
license: "CC0-1.0"
enabled: true
max_pages: 3
selectors:
  event_list: "article[role=item]"
  name: ".article-title h3"
  start_date: ".article-subtitle h4"
  description: ".article-paragraph"
  url: "a"
  image: ".article-image img"
