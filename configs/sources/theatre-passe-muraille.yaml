name: "theatre-passe-muraille"
# WordPress + Elementor site. Scrapes individual show detail pages via sitemap.
# Each show page has: h1.page-title (name), canonical link (url), and date text in a specific
# Elementor widget (.elementor-element-468762ea p:first-of-type). This widget ID is consistent
# across pages and contains dates like "Sep. 20th – 27th, 2025".
# Filter includes only 25-26 season shows with structured date widgets (butch-femme, what-brings-you-in,
# through-the-eyes-of-god). Excludes past/archived shows and shows without standard date widget.
url: "https://passemuraille.ca/25-26-season/"
tier: 1
schedule: "weekly"
trust_level: 7
license: "CC0-1.0"
enabled: true
sitemap:
  url: "https://passemuraille.ca/sitemap_index.xml"
  filter_pattern: "/(?:butch-femme|what-brings-you-in|through-the-eyes-of-god)/$"
  max_urls: 50
  rate_limit_ms: 500
selectors:
  event_list: "article"
  name: "h1.page-title"
  url: "link[rel='canonical']"
  start_date: ".elementor-element-468762ea p:first-of-type"
