name: "luminato"
# DudaOne builder site. /events listing page uses eventscalendar.co embed (Shadow DOM,
# unscrapeable). Individual show detail pages have static HTML with dates in <table>
# rows, title in h1, and venue in paragraph text. Sitemap-based URL discovery with
# exclude_pattern to filter out non-show pages (press releases, programme info, etc.).
# Festival: Annual, June. 2026 festival confirmed with active show pages.
# Organization match: Luminato Festival — or "no match found" / "API unavailable"
url: "https://www.luminatofestival.com/events"
tier: 1
schedule: "weekly"
trust_level: 7
license: "CC0-1.0"
enabled: false
sitemap:
  url: "https://www.luminatofestival.com/sitemap.xml"
  filter_pattern: "luminatofestival\\.com/[A-Za-z0-9][A-Za-z0-9-]*$"
  exclude_pattern: "(artist-page|artist-detail-page|category/|product/|checkout|about|accesshub|access-program|becomeadonor|become-a-partner|careers|contact-us|development-intern|donate|donors|events$|feedback|festival-partners|home|inthecommunity|leadership|leave-a-legacy|media-kit|miigwech|news-and-media|newsletter-signup|ourlegacy|privacy-policy|spektrix-|staff|start-at-|supportus|terms-and|thank-you|volunteer|ways-to-save|copy-of-|Artist-Partner|press-release|programme-announce|programmer-statement|curatorial-statement|festival-survey|staff-list|peter-herndorf|tockify-calendar|rainbow-waiver)"
  max_urls: 50
  rate_limit_ms: 1000
selectors:
  event_list: "#dm_content"
  name: "#1338798650 h1"
  url: "link[rel='canonical']"
  date_selectors:
    - ".dmTable td.cell:first-child"
    - ".dmTable td.cell:nth-child(2)"
