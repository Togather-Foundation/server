name: "koffler-arts"
# Tier 1 (Colly CSS selectors). Koffler Arts Jewish cultural centre.
# WordPress site with div.post event cards. Dates appear in two formats:
# (1) Exhibition/run dates: "Jan 20 - Mar 1, 2026" - WORKS, parses correctly
# (2) Event times: "Sunday March 29 | 1 - 3:30 pm" - FAILS, date normalizer can't handle
#     natural language without year (year omitted from display, relies on page context).
#     See Issue: koffler-arts date normalization missing year inference.
#     For now, 3 events with format (2) are skipped due to this limitation.
url: "https://www.kofflerarts.org/calendar"
tier: 1
schedule: "daily"
trust_level: 7
license: "CC0-1.0"
enabled: true
max_pages: 3
selectors:
  event_list: "div.post"
  name: ".title"
  start_date: ".date"
  location: ".location"
  url: "a.txtbox"
