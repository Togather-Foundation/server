name: "yohomo"
# Tier 2 (headless). Webflow CMS - events are on the homepage at yohomo.ca/
# The /events URL returns 404. Approx 100+ LGBTQ2+ Toronto events.
# Date is split across p.text-style-allcaps elements (day, ".", month, day-number).
url: "https://www.yohomo.ca/"
tier: 2
schedule: "daily"
trust_level: 7
license: "CC0-1.0"
enabled: true
max_pages: 1
headless:
  wait_selector: "div.event"
  wait_timeout_ms: 15000
selectors:
  event_list: "div.event"
  name: "a.event-row"
  start_date: "div.section-event-row-date"
  url: "a.event-row"
