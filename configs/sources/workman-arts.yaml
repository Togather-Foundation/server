name: "workman-arts"
# WordPress site — ticketing via Showpass (venue ID 10892, slug: workman-arts)
# Address: 1025 Queen St W, Toronto
# Main event listing: /events/ (renders via JS/Showpass widget)
# Archive: /rwm-archive-events/ (RSS feed at /rwm-archive-events/feed/)
#
# Tier 3 REST: Showpass public API provides structured event data.
# Same pattern as burdock-brewery.yaml (Showpass venue 17330).
#
# NOTE: Workman Arts programming is seasonal (main season Oct-Nov, RWM festival).
# The Showpass API will return 0 results during off-season — this is expected.
# The source stays enabled; the scraper simply finds no events when none are listed.
#
# Previous approach (Tier 2 headless) abandoned: JS-filtered event page had no
# usable event containers even with Rod rendering.
url: "https://workmanarts.com/events/"
tier: 3
schedule: "daily"
trust_level: 7
license: "CC0-1.0"
enabled: true
rest:
  endpoint: "https://www.showpass.com/api/public/events/?venue=10892"
  results_field: "results"
  next_field: "next"
  url_template: "https://www.showpass.com/{{.slug}}"
  field_map:
    name: "name"
    start_date: "starts_on"
    end_date: "ends_on"
    image: "image"
