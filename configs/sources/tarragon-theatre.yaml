name: "tarragon-theatre"
# WordPress + Nectar theme. Events are listed on /whats-on/ but dates are only on detail pages.
# Using sitemap-based scraping: discover event URLs from sitemap, then scrape each
# detail page to extract dates from <h4> tag formatted as "Month Day – Day, Year".
# Organization match: no match found in database
url: "https://tarragontheatre.com/whats-on/"
tier: 1
schedule: "daily"
trust_level: 5
license: "CC0-1.0"
enabled: true
sitemap:
  url: "https://tarragontheatre.com/wp-sitemap-posts-post-1.xml"
  filter_pattern: "/plays/(2025-2026|tarragon-season-26-27|guest-presentations)/"
  max_urls: 200
selectors:
  event_list: "article"
  name: "h1.vc_custom_heading"
  start_date: "article h4:first-of-type"
  url: "link[rel=canonical]"
