name: "church-wellesley-village-bia"
# UNSCRAPEABLE: Wix OOI (Out-of-iFrame) widget on /events listing page prevents both
# static extraction (JS-required) and headless scraping (OOI anti-scraping protection).
# Attempted Tier 2 approaches:
# - Default wait_selector="body": widget never populates (stays empty)
# - Extended wait_network_idle + 25s timeout: still empty
# - Targeting [data-events-calendar-app]: selector doesn't exist on page
# Sitemap detail pages (/events/<slug>) are individually scrapeable but lack event
# date metadata (only time, location, title present; no full date). This blocks
# normalization (events rejected for missing startDate).
# Recommendation: Implement custom API client if Wix provides an events API.
# Or monitor Wix for future OOI accessibility changes.
# Organization match: no match found in database (API unavailable)
url: "https://www.churchwellesleyvillage.ca/events"
tier: 2
schedule: "weekly"
trust_level: 5
license: "CC0-1.0"
enabled: false
max_pages: 1
headless:
  wait_selector: "body"
  wait_timeout_ms: 25000
  wait_network_idle: true
selectors:
  event_list: "[data-events-calendar-app] [class*='event']"
  name: "[class*='event-title'], h3, h2"
  start_date: "[class*='event-date'], [class*='event-time'], time"
  location: "[class*='event-location'], [class*='event-venue']"
  url: "a[href*='/events/']"
