name: "textile-museum"
# Tier 1 with date_selectors. Textile Museum of Canada uses WordPress + Tribe Events.
# Listing page has event cards with names, URLs, and date/time text in div.card__event-schedule.
# Date format: "Oct 30, 2025, 12pm – Aug 1, 2026, 5pm" (start – end with times).
# date_selectors extracts and parses the complete date text.
url: "https://textilemuseum.ca/programming/"
tier: 1
schedule: "weekly"
trust_level: 8
license: "CC0-1.0"
enabled: true
max_pages: 3
selectors:
  event_list: "div.card--style-event"
  name: "a.h3"
  url: "a.h3"
  date_selectors:
    - "div.card__event-schedule"
