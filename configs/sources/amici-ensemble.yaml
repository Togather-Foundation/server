name: "amici-ensemble"
# Elementor-built WordPress site. Concerts displayed as columns in grid layout under
# "2025-2026 Season Concerts" section on homepage. No JSON-LD Event schema.
# Tier 2 headless browser required to render Elementor page layout.
url: "https://amiciensemble.com/"
tier: 2
schedule: "daily"
trust_level: 6
license: "CC0-1.0"
enabled: true
max_pages: 1
headless:
  wait_selector: "#concerts h2.heading-title"
  wait_timeout_ms: 15000
selectors:
  event_list: "#concerts .elementor-col-25"
  name: "h3.elementor-heading-title a, h2.elementor-heading-title a"
  start_date: ".elementor-widget-text-editor .elementor-widget-container"
  url: "h3.elementor-heading-title a, h2.elementor-heading-title a"
  image: ".elementor-widget-image img"
