name: "lula-lounge"
# Wix site (Thunderbolt architecture) — events displayed via Ticket Spot widget
#
# Platform: Ticket Spot (geteventviewer.com / ticketspotapp.com)
# The home page embeds a cross-origin iframe:
#   <iframe title="Ticket Spot" src="https://client.geteventviewer.com/widget.html?...">
# The iframe contains well-structured event cards (CSS: events-container, list-3PgZT,
# title-2yNb5, details-JMKf7) with dates, descriptions, images, and Eventbrite
# "Buy Tickets" links.
#
# Ticket Spot API (ticketspotapp.com/api) requires signed Wix instance JWT
#   - Token has signDate, expires, regenerated by Wix runtime each page load
#   - Without token: {"error":"Unauthorized Session"}
#   - T3 REST is NOT viable
#
# The parent Wix page itself only shows 2 static image links (one Eventbrite event,
# one Fever search link) — the main event listing is entirely inside the iframe.
#
# Cross-origin iframe extraction (srv-mwy3y): Rod navigates into the Ticket Spot
# iframe via CDP frame navigation, waits for the event container to render, and
# extracts HTML from the iframe DOM. CSS selectors below target iframe content.
#
# NOTE: Ticket Spot uses CSS Modules — class names have a stable human-readable
# prefix with a hash suffix that rotates on deploys (e.g. list-3PgZT, title-2yNb5).
# Selectors below use attribute prefix matching ([class^="title-"]) to survive
# hash rotation. If scraping breaks, re-inspect the iframe DOM with:
#   SCRAPER_HEADLESS_ENABLED=true ./server scrape capture https://www.lula.ca/ --format inspect
#
# Wix app instance ID: 40330713-f873-4545-99c5-64c0078156b6
# Ticket Spot app def ID: 13628e78-3e5c-8b05-bd36-18fe0e00ada3
url: "https://www.lula.ca/"
tier: 2
schedule: "daily"
trust_level: 6
license: "CC0-1.0"
enabled: false
max_pages: 1
headless:
  wait_selector: "body"
  wait_timeout_ms: 15000
  wait_network_idle: true
  iframe:
    selector: "iframe[title='Ticket Spot']"
    wait_selector: ".events-container"
    wait_timeout_ms: 10000
selectors:
  # Selectors target Ticket Spot iframe DOM (entered via iframe config above).
  # Prefix-based attribute selectors survive CSS Modules hash rotation.
  event_list: "[class^='list-'] > div"
  name: "[class^='title-']"
  start_date: "time[datetime]"
  url: "a[href*='eventbrite']"
