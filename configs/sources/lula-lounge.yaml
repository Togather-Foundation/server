name: "lula-lounge"
# Wix SPA (React/Thunderbolt) — Events aggregated from external platforms
# /events returns 404; events available via Eventbrite (cross-origin iframe on home page)
# Home page: https://www.lula.ca/ has embedded Eventbrite + Fever + custom Ticket Spot widget
# Cross-origin iframes BLOCK scraping; cannot extract from Wix directly
#
# Eventbrite API is OAuth-only (NOT public) — T3 REST is not viable.
# Best approach: T2 headless scrape of the Eventbrite organizer page directly:
#   https://www.eventbrite.ca/o/lula-lounge-4108527983
# The organizer page is server-rendered and lists all upcoming events publicly.
# Alternative: Contact venue for dedicated events API, iCal feed, or JSON feed.
url: "https://www.lula.ca/"
tier: 2
schedule: "daily"
trust_level: 6
license: "CC0-1.0"
enabled: false
max_pages: 1
headless:
  wait_selector: "body"
  wait_timeout_ms: 15000
  # Note: Eventbrite iframe is cross-origin, will not be scrapeable
selectors:
  event_list: "div.event-card, li.event, article[data-testid*='event']"
  name: "h2.event-title, span.event-name, a.event-link"
  start_date: "time[datetime], span.event-date, div.date"
  url: "a[href*='eventbrite'], a.event-link"
