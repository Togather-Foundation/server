name: "aga-khan-museum"
# Tier 1 (Colly CSS selectors). Static HTML event cards with date/time separation.
# ISSUE: Date labels contain ranges ("May 6, 2025–May 25, 2026") and recurring
# patterns ("Wednesdays", "Sundays") that fail date parsing. Range-detection regex
# requires spaces around en-dashes (e.g. " – "), but actual HTML has no spaces
# ("2025–May"), so splitDateRange fails. Using start_date instead of date_selectors
# to at least capture single-date events. Events with ranges/recurring patterns
# (14+) are legitimately skipped — they are exhibitions/programs without discrete
# start dates. This is acceptable as-is; see scraper-worker issues for potential
# fixes (more flexible range regex, or detail-page scraping for dates).
# Organization: Aga Khan Museum (museum, trust_level: 8)
url: "https://agakhanmuseum.org/whats-on/"
tier: 1
schedule: "daily"
trust_level: 8
license: "CC0-1.0"
enabled: true
max_pages: 3
selectors:
  event_list: "div.c-event-card__wrap"
  name: "h3.c-event-card__title"
  start_date: "span.c-event-card__date-label"
  url: "a.c-event-card__link"
