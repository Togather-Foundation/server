name: "royal-conservatory-music"
# Kentico CMS (ASP.NET) — RC Music event calendar is AWS CloudSearch powered
# Event listing: /events-and-performances (server-rendered with possible AJAX pagination)
# Contains multiple concert series: Royal Conservatory Concerts, Mazzoleni, Temerty Theatre
# Signature Events: /support-us/signature-events and subpages
# Known issue: Page returns minimal content in headless inspect (Status: 0); may be protected or require specific headers
url: "https://www.rcmusic.com/events-and-performances"
tier: 2
schedule: "daily"
trust_level: 8
license: "CC0-1.0"
enabled: false
max_pages: 2
headless:
  wait_selector: "body, div.event-listing, div.event-result"
  wait_timeout_ms: 20000
  wait_network_idle: true
selectors:
  event_list: "div.event-result, article.event, div.concert-item, li.event"
  name: "h3.event-title, a.event-name, span.title"
  start_date: "time.event-date, time[datetime], span.start-date, div.event-date"
  url: "a.event-link, a[href*='/performance/']"
