name: "east-end-arts"
# Tier 3 REST — WordPress REST API endpoint. Upgraded from T1 to T3 March 2026.
# Previous issue: dates only in excerpt text, not structured <time> elements.
# WordPress REST API provides structured RFC 3339 dates in the 'date' field.
# Tested: /wp-json/wp/v2/posts returns ≥10 events with title, date (RFC 3339), link.
# Organization match: API unavailable (server not running) — try again at runtime.
url: "https://eastendarts.ca/"
tier: 3
schedule: "daily"
trust_level: 6
license: "CC0-1.0"
enabled: true
rest:
  endpoint: "https://eastendarts.ca/wp-json/wp/v2/posts?per_page=10"
  # WordPress returns pagination metadata in the response headers, not JSON body.
  # Use bare array mode since response is a JSON array at root level.
  results_field: "."
  field_map:
    name: "title.rendered"
    start_date: "date"
    url: "link"
