name: "now-toronto"
# NOW Toronto arts/culture events — WordPress The Events Calendar (Tribe)
# ICS feed fetched directly as plain HTTP — Cloudflare allows this (cf-cache-status: HIT).
# Note: HTML events page (/events/) triggers Cloudflare Turnstile CAPTCHA but the
# ICS endpoint (?ical=1) is served from Cloudflare cache and does not require a browser.
# Organization match: no match found in database
url: "https://nowtoronto.com/events/?ical=1"
extraction_method: ics
schedule: "daily"
trust_level: 5
license: "CC0-1.0"
timezone: "America/Toronto"
enabled: true
