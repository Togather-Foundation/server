name: "xtsc"
# Extreme Toronto Sports Club (XTSC) — trans/queer recreational sports league in Toronto.
# Zuluru platform (zuluru.org) — sports league registration/scheduling system.
#
# Platform: Zuluru v3.5+
# Event listings use HTML structure: <span class="prices option_id_XXXX" data-event="EVENT_NAME" data-link="HTML_ENCODED_LINK" ...>
# Event names are stored in data-event attributes, not in DOM text.
#
# Selector syntax: "selector::attribute" extracts the attribute value instead of text.
# Example: "span.prices::data-event" extracts the data-event attribute.
#
# The URL in data-link is HTML-encoded and contains an <a> tag that can't be parsed
# via CSS selectors alone. For now, extracting only the event name via attribute syntax.
#
# Note: This page is dynamic (JavaScript form filters) but events are visible in static HTML.
# Tier 1 static extraction is viable for event names; URLs would require JS parsing.
#
# Organization match: Extreme Toronto Sports Club (no direct match in database; sports league)
url: "https://www.xtsc.ca/zuluru/events/"
tier: 1
schedule: "weekly"
trust_level: 6
license: "CC0-1.0"
enabled: false
max_pages: 2
selectors:
  event_list: "span.prices"
  # Event name extracted from data-event attribute using new :: syntax
  name: "span.prices::data-event"
