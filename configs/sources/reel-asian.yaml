name: "reel-asian"
# Reel Asian International Film Festival (Toronto). WordPress + Elevent ticketing widget.
# Year-round events at /year-round/current-events/ use Elevent embedded widget (AJAX).
# UNSCRAPEABLE: Elevent widget is a cross-origin iframe/component hosted on elevent-cdn.azureedge.net.
# Even with headless rendering (Tier 2 Rod), the actual event items are not injected into the DOM
# in a scrapeable way - they're rendered inside a sandboxed cross-origin iframe that cannot be
# accessed by content scripts (same-origin policy). Direct API would be required.
url: "https://www.reelasian.com/year-round/current-events/"
tier: 2
schedule: "weekly"
trust_level: 7
license: "CC0-1.0"
enabled: false
headless:
  wait_selector: "body"
  wait_timeout_ms: 15000
