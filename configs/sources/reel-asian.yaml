name: "reel-asian"
# Reel Asian International Film Festival (Toronto). WordPress with Visual Composer
# Year-round events page (/year-round/current-events/) uses static HTML event cards.
# Events are arranged in Visual Composer columns with event boxes (image + title + description).
# BLOCKER: Dates are embedded in narrative text (e.g., "On Sun, March 15, 2026, Reel Asian will host...").
# CSS cannot extract just the date prefix, and go-dateparser fails on narrative paragraphs.
# Events can be extracted (name, URL, image, description) but not dates.
# Tier 1 static HTML scraping.
# Organization match: no match found in database
url: "https://www.reelasian.com/year-round/current-events/"
tier: 1
schedule: "daily"
trust_level: 6
license: "CC0-1.0"
enabled: false
max_pages: 1
timezone: "America/Toronto"
selectors:
  event_list: ".wpb_column.vc_col-sm-4"
  name: ".wpb_text_column a strong, .wpb_text_column a b"
  url: ".wpb_text_column a"
  description_selectors:
    - ".btn-wrapper p"
  image: ".wpb_single_image-img"
