# Tockify ICS feed contains malformed X-TKF-PROMOTION-BUTTON properties with
# underscore-containing parameter names (skip_details=false). These are
# non-RFC-5545-compliant but harmless. Our golang-ical fork (v0.3.6-fork.1)
# handles them via WithPropertyParseErrorHandler — see go.mod replace directive
# and upstream PR: https://github.com/arran4/golang-ical/pull/135
name: "torevent"
url: "https://tockify.com/api/feeds/ics/torevent"
extraction_method: ics
schedule: "daily"
trust_level: 5
license: "CC0-1.0"
timezone: "America/Toronto"
enabled: true
